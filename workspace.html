<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveNet Workspace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #2d2d2d;
            padding: 12px 20px;
            border-bottom: 2px solid #3d3d3d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #00d4aa;
        }

        .status {
            display: flex;
            gap: 15px;
            font-size: 12px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00d4aa;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .corkboard {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-area {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            border: 2px solid #3d3d3d;
        }

        .input-area textarea {
            width: 100%;
            min-height: 100px;
            background: #1a1a1a;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            padding: 12px;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .input-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background: #00d4aa;
            color: #1a1a1a;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: background 0.2s;
        }

        button:hover {
            background: #00ffcc;
        }

        button.secondary {
            background: #3d3d3d;
            color: #e0e0e0;
        }

        button.secondary:hover {
            background: #4d4d4d;
        }

        .items-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            background: #2d2d2d;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            padding: 12px;
            position: relative;
        }

        .item.pinned {
            border-left: 4px solid #00d4aa;
            background: #2d3d3d;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-meta {
            font-size: 11px;
            color: #888;
        }

        .item-actions {
            display: flex;
            gap: 8px;
        }

        .item-actions button {
            padding: 4px 10px;
            font-size: 11px;
        }

        .item-content {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #e0e0e0;
        }

        .sidebar {
            width: 280px;
            background: #242424;
            border-left: 2px solid #3d3d3d;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar h3 {
            font-size: 14px;
            color: #00d4aa;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mesh-status {
            background: #2d2d2d;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
        }

        .node-item {
            padding: 8px 0;
            border-bottom: 1px solid #3d3d3d;
            font-size: 12px;
        }

        .node-item:last-child {
            border-bottom: none;
        }

        .node-name {
            font-weight: 600;
            color: #e0e0e0;
        }

        .node-status {
            color: #888;
            font-size: 11px;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>HiveNet Workspace</h1>
        <div class="status">
            <div class="status-item">
                <div class="status-dot"></div>
                <span>Mesh Active</span>
            </div>
            <div class="status-item">
                <span id="item-count">0 items</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="corkboard">
            <div class="input-area">
                <textarea id="input-text" placeholder="Drop content here... text, code, notes, anything."></textarea>
                <div class="input-actions">
                    <button onclick="workspace.addItem()">Drop to Board</button>
                    <button onclick="workspace.addItem(true)" class="secondary">Drop + Pin</button>
                    <button onclick="workspace.clearInput()" class="secondary">Clear</button>
                </div>
            </div>

            <div class="items-container" id="items-container">
                <div class="empty-state">
                    No items on the board yet. Drop something above to get started.
                </div>
            </div>
        </div>

        <div class="sidebar">
            <h3>Mesh Nodes</h3>
            <div class="mesh-status">
                <div class="node-item">
                    <div class="node-name">Workspace</div>
                    <div class="node-status">This tab (active)</div>
                </div>
                <div class="node-item">
                    <div class="node-name">BroadcastChannel</div>
                    <div class="node-status">Listening on 'hivenet-mesh'</div>
                </div>
            </div>

            <h3>Actions</h3>
            <button onclick="workspace.clearAll()" class="secondary" style="width: 100%; margin-top: 10px;">Clear All Items</button>
            <button onclick="workspace.exportData()" class="secondary" style="width: 100%; margin-top: 10px;">Export Data</button>
        </div>
    </div>

    <script src="/static/workspace.js"></script>
</body>
</html>
